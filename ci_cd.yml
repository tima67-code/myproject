name: CI/CD Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: python -m unittest discover

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Код отправлен на сервер"
